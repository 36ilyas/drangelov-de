name: Deploy zu GitHub Pages

# Veroeffentlicht den Ordner public/ automatisch bei jedem Push auf main.
# Einmalig noetig: Repo-Settings -> Pages -> "Build and deployment" -> Source = "GitHub Actions".

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Pages konfigurieren
        uses: actions/configure-pages@v5
      - name: Artefakt hochladen (nur public/)
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public
      - name: Deployen
        id: deployment
        uses: actions/deploy-pages@v4
